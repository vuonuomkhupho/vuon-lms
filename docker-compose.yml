# Vuon LMS — Frappe LMS deployment
# Based on: https://github.com/frappe/frappe_docker/blob/main/compose.yaml
#
# Quick start:
#   1. cp .env.example .env  (edit values)
#   2. ./scripts/build-image.sh vuon-lms:latest
#   3. docker compose up -d
#   4. docker compose exec backend bench new-site $FRAPPE_SITE_NAME \
#        --mariadb-root-password $DB_PASSWORD \
#        --admin-password $ADMIN_PASSWORD \
#        --install-app erpnext --install-app lms --install-app dfp_external_storage
#   5. docker compose exec backend bench --site $FRAPPE_SITE_NAME set-config host_name "http://localhost:8080"
#   6. Open http://localhost:8080

x-customizable-image: &customizable_image
  image: ${CUSTOM_IMAGE:-frappe/erpnext:v15}
  platform: linux/amd64
  restart: unless-stopped

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

services:
  # ─── Infrastructure ───

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 10

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  # ─── Frappe Services ───

  configurator:
    <<: *customizable_image
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps/frappe; bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      mariadb:
        condition: service_healthy

  backend:
    <<: [*customizable_image, *depends_on_configurator]
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  websocket:
    <<: [*customizable_image, *depends_on_configurator]
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-short:
    <<: [*customizable_image, *depends_on_configurator]
    command: bench worker --queue short,default
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-long:
    <<: [*customizable_image, *depends_on_configurator]
    command: bench worker --queue long,default,short
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  scheduler:
    <<: [*customizable_image, *depends_on_configurator]
    command: bench schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  frontend:
    image: frappe/frappe-nginx:v15
    restart: unless-stopped
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME:-lms.localhost}
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    ports:
      - "${HTTP_PORT:-8080}:8080"
    depends_on:
      - backend
      - websocket

volumes:
  db-data:
  redis-queue-data:
  sites:
